services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4 --limit-concurrency 100 --timeout-keep-alive 30
    env_file: ./backend/.env
    expose:
      - "8000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
