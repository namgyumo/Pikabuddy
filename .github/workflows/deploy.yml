name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - "nginx/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/edu-platform
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            sleep 5
            curl -f http://localhost:8000/health || echo "Health check failed"
